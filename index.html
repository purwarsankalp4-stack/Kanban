<!DOCTYPE html>
<html>
<head>
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kanban Board</h1>

<div class="board">

  <div class="column" data-column="todo">
    <h2>To Do</h2>
    <div class="tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <input type="text" placeholder="New task..." onkeypress="handleKey(event, 'todo')">
  </div>

  <div class="column" data-column="inprogress">
    <h2>In Progress</h2>
    <div class="tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <input type="text" placeholder="New task..." onkeypress="handleKey(event, 'inprogress')">
  </div>

  <div class="column" data-column="done">
    <h2>Done</h2>
    <div class="tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <input type="text" placeholder="New task..." onkeypress="handleKey(event, 'done')">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
